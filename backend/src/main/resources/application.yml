spring:
  application:
    name: hobbyheaven

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hobbyheaven}
    username: ${DB_USER:hobbyheaven}
    password: ${DB_PASSWORD:hobbyheaven}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate           # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Storage — all files (images, PDFs, etc.) go under this path
hobbyheaven:
  storage:
    base-path: ${STORAGE_PATH:/data}
  auth:
    enabled: ${AUTH_ENABLED:false}

# Actuator — health check for Docker
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  # Serve React SPA — forward unknown paths to index.html
  forward-headers-strategy: native

logging:
  level:
    com.hobbyheaven: INFO
    org.springframework.security: WARN
